<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 340" role="img" aria-label="PWM の波形と Duty 比">
  <title>PWM の Duty 比：25% / 50% / 75% それぞれで平均電圧が違う</title>
  <defs>
    <style>
      .lbl   { font-family: "Noto Sans JP", system-ui, sans-serif; font-size: 13px; fill: #222; }
      .big   { font-family: "Noto Sans JP", system-ui, sans-serif; font-size: 14px; font-weight: bold; fill: #222; }
      .small { font-family: "Noto Sans JP", system-ui, sans-serif; font-size: 11px; fill: #444; }
      .mono  { font-family: monospace; font-size: 12px; fill: #222; }
      .axis  { stroke: #525252; stroke-width: 1.5; fill: none; }
      .wave  { stroke: #1565c0; stroke-width: 2.5; fill: none; }
      .avg   { stroke: #c62828; stroke-width: 1.5; stroke-dasharray: 5 3; fill: none; }
    </style>
  </defs>

  <text x="390" y="25" text-anchor="middle" class="big">PWM：Duty 比で平均電圧（平均電力）を変える</text>

  <!-- Common Y axis label -->
  <text x="25" y="60" class="small">5V</text>
  <text x="25" y="320" class="small">0V</text>

  <!-- Panel 1: 25% duty -->
  <g transform="translate(30,55)">
    <text x="160" y="12" text-anchor="middle" class="big">Duty 25%</text>
    <text x="160" y="28" text-anchor="middle" class="small">analogWrite(pin, 64)</text>

    <!-- Axes -->
    <line x1="20" y1="45" x2="20" y2="180" class="axis"/>
    <line x1="20" y1="180" x2="300" y2="180" class="axis"/>
    <text x="310" y="185" class="small">t</text>

    <!-- Waveform: 25% HIGH 75% LOW -->
    <path d="M 20 180 L 20 55 L 50 55 L 50 180 L 140 180 L 140 55 L 170 55 L 170 180 L 260 180 L 260 55 L 290 55 L 290 180" class="wave"/>

    <!-- Average line at 25% of 5V -->
    <line x1="20" y1="148" x2="300" y2="148" class="avg"/>
    <text x="310" y="152" class="small" fill="#c62828">≒ 1.25 V</text>
  </g>

  <!-- Panel 2: 50% duty -->
  <g transform="translate(30,205)">
    <text x="160" y="12" text-anchor="middle" class="big">Duty 50%</text>
    <text x="160" y="28" text-anchor="middle" class="small">analogWrite(pin, 127)</text>

    <line x1="20" y1="45" x2="20" y2="130" class="axis"/>
    <line x1="20" y1="130" x2="300" y2="130" class="axis"/>

    <!-- 50% duty -->
    <path d="M 20 130 L 20 55 L 80 55 L 80 130 L 140 130 L 140 55 L 200 55 L 200 130 L 260 130 L 260 55 L 290 55" class="wave"/>

    <line x1="20" y1="92" x2="300" y2="92" class="avg"/>
  </g>

  <!-- Panel 3: 75% duty (right side) -->
  <g transform="translate(420,55)">
    <text x="160" y="12" text-anchor="middle" class="big">Duty 75%</text>
    <text x="160" y="28" text-anchor="middle" class="small">analogWrite(pin, 191)</text>

    <line x1="20" y1="45" x2="20" y2="180" class="axis"/>
    <line x1="20" y1="180" x2="300" y2="180" class="axis"/>
    <text x="310" y="185" class="small">t</text>

    <!-- 75% duty -->
    <path d="M 20 180 L 20 55 L 110 55 L 110 180 L 140 180 L 140 55 L 230 55 L 230 180 L 260 180 L 260 55 L 290 55" class="wave"/>

    <line x1="20" y1="86" x2="300" y2="86" class="avg"/>
    <text x="310" y="90" class="small" fill="#c62828">≒ 3.75 V</text>
  </g>

  <!-- Panel 4: Info box -->
  <g transform="translate(420,205)">
    <rect x="0" y="0" width="320" height="125" rx="6" fill="#f5f5f5" stroke="#888"/>
    <text x="160" y="22" text-anchor="middle" class="big">Arduino Uno の analogWrite</text>
    <text x="15" y="44" class="small">・ 引数 0〜255 で Duty 比 0〜100% を指定</text>
    <text x="15" y="62" class="small">・ PWM 出力可能ピンは <tspan class="mono">D3, D5, D6, D9, D10, D11</tspan> の 6 本</text>
    <text x="15" y="80" class="small">・ デフォルト周波数：</text>
    <text x="25" y="96" class="small">　- D3, D9, D10, D11 → 約 490 Hz</text>
    <text x="25" y="112" class="small">　- D5, D6 → 約 980 Hz</text>
  </g>
</svg>
