<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 460" role="img" aria-label="ロジック電源とモータ電源の分離：NG と OK のトポロジ比較">
  <title>NG：単一電源で MCU とモータを共用する／OK：V を別系統にし GND だけ共通にする</title>
  <defs>
    <style>
      .lbl   { font-family: "Noto Sans JP", system-ui, sans-serif; font-size: 13px; fill: #222; }
      .big   { font-family: "Noto Sans JP", system-ui, sans-serif; font-size: 15px; font-weight: bold; fill: #222; }
      .mono  { font-family: monospace; font-size: 12px; fill: #222; }
      .box   { fill: #ffffff; stroke: #525252; stroke-width: 2; }
      .src   { fill: #fff3e0; stroke: #ef6c00; stroke-width: 2; }
      .gnd   { fill: #eceff1; stroke: #525252; stroke-width: 2; }
      .wire  { stroke: #525252; stroke-width: 2; fill: none; }
      .vline { stroke: #c62828; stroke-width: 2.5; fill: none; }
      .gline { stroke: #212121; stroke-width: 2.5; fill: none; }
      .ng-banner { fill: #ffebee; stroke: #c62828; stroke-width: 2; }
      .ok-banner { fill: #e8f5e9; stroke: #2e7d32; stroke-width: 2; }
      .ng-t  { fill: #c62828; font-weight: bold; font-family: "Noto Sans JP", system-ui, sans-serif; font-size: 15px; }
      .ok-t  { fill: #2e7d32; font-weight: bold; font-family: "Noto Sans JP", system-ui, sans-serif; font-size: 15px; }
      .vcc-label { fill: #c62828; font-family: monospace; font-size: 12px; font-weight: bold; }
      .warning-wave { stroke: #c62828; stroke-width: 2; fill: none; }
    </style>
  </defs>

  <!-- ===================== LEFT: NG ===================== -->
  <g transform="translate(0,0)">
    <!-- Banner -->
    <rect x="20" y="20" width="380" height="36" rx="6" class="ng-banner"/>
    <text x="210" y="44" text-anchor="middle" class="ng-t">NG：USB 単電源で MCU ＋モータ</text>

    <!-- Power source -->
    <rect x="40" y="90" width="110" height="56" rx="4" class="src"/>
    <text x="95" y="114" text-anchor="middle" class="big">USB 5V</text>
    <text x="95" y="134" text-anchor="middle" class="mono">max 500 mA</text>

    <!-- MCU -->
    <rect x="200" y="90" width="110" height="56" rx="4" class="box"/>
    <text x="255" y="114" text-anchor="middle" class="big">Arduino Uno</text>
    <text x="255" y="134" text-anchor="middle" class="mono">VCC 5V / 50 mA</text>

    <!-- Motor driver -->
    <rect x="40" y="220" width="110" height="56" rx="4" class="box"/>
    <text x="95" y="244" text-anchor="middle" class="big">モータドライバ</text>
    <text x="95" y="264" text-anchor="middle" class="mono">V_M / V_CC</text>

    <!-- Motor -->
    <circle cx="285" cy="248" r="34" class="box"/>
    <text x="285" y="254" text-anchor="middle" class="big" font-size="20">M</text>
    <text x="285" y="298" text-anchor="middle" class="mono">突入 500 mA+</text>

    <!-- Wires: single 5V rail -->
    <!-- USB → MCU VCC -->
    <line x1="150" y1="105" x2="200" y2="105" class="vline"/>
    <!-- USB → Driver V_CC (branch) -->
    <path d="M 155 105 L 180 105 L 180 230 L 40 230" class="vline" stroke-width="0" opacity="0"/>
    <!-- actual shared rail -->
    <path d="M 150 110 L 175 110 L 175 240 L 40 240" class="vline"/>
    <text x="168" y="178" class="vcc-label">共通 5V</text>

    <!-- Driver → Motor -->
    <line x1="150" y1="248" x2="251" y2="248" class="wire"/>

    <!-- GND wires -->
    <path d="M 95 146 L 95 180 L 355 180 L 355 146" class="gline"/>
    <path d="M 95 276 L 95 310 L 285 310 L 285 282" class="gline" />
    <!-- Connect the two GND nets -->
    <line x1="95" y1="180" x2="95" y2="276" class="gline"/>
    <text x="355" y="178" text-anchor="start" class="mono">GND</text>

    <!-- Warning: inrush reaches MCU through shared rail -->
    <path d="M 178 200 Q 195 195 200 180 Q 205 165 215 170" class="warning-wave"/>
    <polygon points="215,170 206,167 210,176" fill="#c62828"/>
    <text x="218" y="200" class="ng-t" font-size="13">突入電流が</text>
    <text x="218" y="216" class="ng-t" font-size="13">MCU 側にも届く</text>

    <!-- Conclusion -->
    <rect x="40" y="370" width="340" height="64" rx="6" class="ng-banner"/>
    <text x="210" y="392" text-anchor="middle" class="ng-t" font-size="14">結果：モータ起動で VCC が落ちる</text>
    <text x="210" y="412" text-anchor="middle" class="lbl">→ MCU リセット → 永久ループ（ブラウンアウト）</text>
  </g>

  <!-- Center divider -->
  <line x1="410" y1="20" x2="410" y2="440" stroke="#bbbbbb" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- ===================== RIGHT: OK ===================== -->
  <g transform="translate(410,0)">
    <!-- Banner -->
    <rect x="20" y="20" width="380" height="36" rx="6" class="ok-banner"/>
    <text x="210" y="44" text-anchor="middle" class="ok-t">OK：V を分離、GND を共通</text>

    <!-- Power A: USB -->
    <rect x="40" y="80" width="110" height="56" rx="4" class="src"/>
    <text x="95" y="104" text-anchor="middle" class="big">USB 5V</text>
    <text x="95" y="124" text-anchor="middle" class="mono">ロジック専用</text>

    <!-- MCU -->
    <rect x="200" y="80" width="110" height="56" rx="4" class="box"/>
    <text x="255" y="104" text-anchor="middle" class="big">Arduino Uno</text>
    <text x="255" y="124" text-anchor="middle" class="mono">VCC 5V</text>

    <!-- Power B: battery -->
    <rect x="40" y="200" width="110" height="56" rx="4" class="src"/>
    <text x="95" y="224" text-anchor="middle" class="big">7.4V 電池</text>
    <text x="95" y="244" text-anchor="middle" class="mono">モータ専用</text>

    <!-- Motor driver -->
    <rect x="200" y="200" width="110" height="56" rx="4" class="box"/>
    <text x="255" y="218" text-anchor="middle" class="big">モータドライバ</text>
    <text x="255" y="234" text-anchor="middle" class="mono">V_CC=5V (ロジック)</text>
    <text x="255" y="248" text-anchor="middle" class="mono">V_M =7.4V (モータ)</text>

    <!-- Motor -->
    <circle cx="360" cy="228" r="28" class="box"/>
    <text x="360" y="234" text-anchor="middle" class="big" font-size="18">M</text>

    <!-- Logic rail (red) -->
    <line x1="150" y1="92" x2="200" y2="92" class="vline"/>
    <path d="M 175 92 L 175 60 L 255 60 L 255 200" class="vline"/>
    <text x="182" y="75" class="vcc-label">5V (logic)</text>

    <!-- Motor rail (red, separate) -->
    <line x1="150" y1="212" x2="200" y2="212" class="vline"/>
    <text x="162" y="202" class="vcc-label">7.4V (motor)</text>

    <!-- Signal line from MCU to driver -->
    <path d="M 255 136 L 255 170 L 230 170 L 230 200" stroke="#1565c0" stroke-width="2" fill="none" stroke-dasharray="4 2"/>
    <text x="265" y="170" class="mono" fill="#1565c0">PWM 信号</text>

    <!-- Driver → Motor -->
    <line x1="310" y1="228" x2="332" y2="228" class="wire"/>

    <!-- GND: common -->
    <path d="M 95 136 L 95 170 L 255 170 L 255 136" class="gline" stroke-dasharray="0" opacity="0"/>
    <!-- Actual GND wiring: USB GND → MCU GND → driver GND → battery GND -->
    <path d="M 95 136 L 95 300 L 360 300 L 360 256" class="gline"/>
    <line x1="255" y1="136" x2="255" y2="300" class="gline" stroke-dasharray="0"/>
    <circle cx="255" cy="300" r="3.5" fill="#212121"/>
    <line x1="95" y1="256" x2="95" y2="300" class="gline"/>
    <text x="120" y="318" class="mono">GND を全員で 1 点に集める</text>

    <!-- Conclusion -->
    <rect x="40" y="370" width="340" height="64" rx="6" class="ok-banner"/>
    <text x="210" y="392" text-anchor="middle" class="ok-t" font-size="14">結果：モータの電流変動はモータレールだけに出る</text>
    <text x="210" y="412" text-anchor="middle" class="lbl">→ MCU の VCC は安定、リセットしない</text>
  </g>
</svg>
