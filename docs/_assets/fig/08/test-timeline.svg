<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 440" role="img" aria-label="電源投入後の観察タイムライン">
  <title>電源投入後の 5 段階観察：0〜2 秒 3 感チェック、2〜10 秒 安定観察、10〜30 秒 温度確認、30 秒〜1 分 機能確認、1 分以降 長期観察</title>
  <defs>
    <style>
      .lbl   { font-family: "Noto Sans JP", system-ui, sans-serif; font-size: 12px; fill: #222; }
      .big   { font-family: "Noto Sans JP", system-ui, sans-serif; font-size: 14px; font-weight: bold; fill: #222; }
      .small { font-family: "Noto Sans JP", system-ui, sans-serif; font-size: 11px; fill: #444; }
      .ph-1 { fill: #ffebee; stroke: #c62828; stroke-width: 2; }
      .ph-2 { fill: #fff3e0; stroke: #ef6c00; stroke-width: 2; }
      .ph-3 { fill: #fff9c4; stroke: #f9a825; stroke-width: 2; }
      .ph-4 { fill: #e1f5fe; stroke: #0277bd; stroke-width: 2; }
      .ph-5 { fill: #e8f5e9; stroke: #2e7d32; stroke-width: 2; }
      .t-1 { fill: #c62828; font-weight: bold; }
      .t-2 { fill: #ef6c00; font-weight: bold; }
      .t-3 { fill: #f9a825; font-weight: bold; }
      .t-4 { fill: #0277bd; font-weight: bold; }
      .t-5 { fill: #2e7d32; font-weight: bold; }
      .axis { stroke: #525252; stroke-width: 2; fill: none; }
      .tick { stroke: #525252; stroke-width: 1.2; fill: none; }
      .power-on { stroke: #c62828; stroke-width: 3; fill: none; }
    </style>
  </defs>

  <!-- Title -->
  <text x="420" y="25" text-anchor="middle" class="big">電源投入後の観察タイムライン（第 8 章の全体図）</text>

  <!-- Power-on event marker at the start -->
  <line x1="60" y1="70" x2="60" y2="390" class="power-on" stroke-dasharray="4 3"/>
  <text x="60" y="62" text-anchor="middle" class="big t-1">⚡ 電源 ON</text>

  <!-- Time axis -->
  <line x1="60" y1="370" x2="790" y2="370" class="axis"/>
  <polygon points="790,370 780,365 780,375" fill="#525252"/>
  <text x="810" y="374" class="lbl">時間</text>

  <!-- Time ticks -->
  <line x1="60"  y1="370" x2="60"  y2="378" class="tick"/>
  <text x="60"  y="392" text-anchor="middle" class="small">0 s</text>
  <line x1="140" y1="370" x2="140" y2="378" class="tick"/>
  <text x="140" y="392" text-anchor="middle" class="small">2 s</text>
  <line x1="260" y1="370" x2="260" y2="378" class="tick"/>
  <text x="260" y="392" text-anchor="middle" class="small">10 s</text>
  <line x1="420" y1="370" x2="420" y2="378" class="tick"/>
  <text x="420" y="392" text-anchor="middle" class="small">30 s</text>
  <line x1="580" y1="370" x2="580" y2="378" class="tick"/>
  <text x="580" y="392" text-anchor="middle" class="small">1 min</text>
  <line x1="780" y1="370" x2="780" y2="378" class="tick"/>
  <text x="780" y="392" text-anchor="middle" class="small">5 min 〜</text>

  <!-- Phase 1: 0-2s (emergency senses) -->
  <rect x="60" y="80" width="80" height="55" class="ph-1"/>
  <text x="100" y="100" text-anchor="middle" class="big t-1">(F) 3 感</text>
  <text x="100" y="120" text-anchor="middle" class="small t-1">煙／匂／音</text>

  <!-- Phase 2: 2-10s (stability) -->
  <rect x="140" y="150" width="120" height="55" class="ph-2"/>
  <text x="200" y="170" text-anchor="middle" class="big t-2">安定観察</text>
  <text x="200" y="190" text-anchor="middle" class="small t-2">VCC 実測・異常発熱</text>

  <!-- Phase 3: 10-30s (temperature) -->
  <rect x="260" y="220" width="160" height="55" class="ph-3"/>
  <text x="340" y="240" text-anchor="middle" class="big t-3">(H) 温度確認</text>
  <text x="340" y="260" text-anchor="middle" class="small t-3">指かざしで 40/60℃ 判定</text>

  <!-- Phase 4: 30s-1min (functional) -->
  <rect x="420" y="150" width="160" height="55" class="ph-4"/>
  <text x="500" y="170" text-anchor="middle" class="big t-4">(I) 機能確認</text>
  <text x="500" y="190" text-anchor="middle" class="small t-4">書き込み・シリアル・I/O</text>

  <!-- Phase 5: 1min+ (long-term) -->
  <rect x="580" y="80" width="210" height="55" class="ph-5"/>
  <text x="685" y="100" text-anchor="middle" class="big t-5">長期観察</text>
  <text x="685" y="120" text-anchor="middle" class="small t-5">モータ駆動・再温度・ブラウンアウト</text>

  <!-- Connecting dotted lines from time axis up to boxes -->
  <line x1="100" y1="370" x2="100" y2="135" stroke="#c62828" stroke-width="1" stroke-dasharray="2 3" opacity="0.5"/>
  <line x1="200" y1="370" x2="200" y2="205" stroke="#ef6c00" stroke-width="1" stroke-dasharray="2 3" opacity="0.5"/>
  <line x1="340" y1="370" x2="340" y2="275" stroke="#f9a825" stroke-width="1" stroke-dasharray="2 3" opacity="0.5"/>
  <line x1="500" y1="370" x2="500" y2="205" stroke="#0277bd" stroke-width="1" stroke-dasharray="2 3" opacity="0.5"/>
  <line x1="685" y1="370" x2="685" y2="135" stroke="#2e7d32" stroke-width="1" stroke-dasharray="2 3" opacity="0.5"/>

  <!-- Abort threshold annotation on the right -->
  <rect x="60" y="280" width="360" height="80" rx="6" fill="#fff" stroke="#c62828" stroke-width="1.5"/>
  <text x="240" y="302" text-anchor="middle" class="big t-1">即座に電源 OFF する条件</text>
  <text x="78" y="324" class="small">・煙・焦げ臭・パチッという音（任意の段階）</text>
  <text x="78" y="340" class="small">・部品に手をかざして 熱風 を感じる（&gt; 60 ℃ 相当）</text>
  <text x="78" y="356" class="small">・VCC が規定値 ±10 % を外れている</text>

  <!-- OK path on the right -->
  <rect x="440" y="280" width="350" height="80" rx="6" fill="#fff" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="615" y="302" text-anchor="middle" class="big t-5">全段 OK なら</text>
  <text x="458" y="324" class="small">・書き込みとシリアル出力が想定どおり</text>
  <text x="458" y="340" class="small">・1 分観察で温度・電圧が安定</text>
  <text x="458" y="356" class="small">→ 次章（第 9 章）は動かないときの切り分け用</text>
</svg>
