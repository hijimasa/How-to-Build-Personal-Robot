<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 340" role="img" aria-label="5V と 3.3V 混在時のレベル変換">
  <title>5V マイコンと 3.3V センサ直結の NG と、レベル変換 IC 経由の OK</title>
  <defs>
    <style>
      .lbl   { font-family: "Noto Sans JP", system-ui, sans-serif; font-size: 12px; fill: #222; }
      .big   { font-family: "Noto Sans JP", system-ui, sans-serif; font-size: 14px; font-weight: bold; fill: #222; }
      .small { font-family: "Noto Sans JP", system-ui, sans-serif; font-size: 11px; fill: #444; }
      .wire  { stroke: #525252; stroke-width: 2; fill: none; }
      .board { stroke: #525252; stroke-width: 2; fill: #eceff1; }
      .sensor { stroke: #525252; stroke-width: 2; fill: #fff3e0; }
      .level { stroke: #525252; stroke-width: 2; fill: #e1f5fe; }
      .ng-panel { fill: #ffebee; stroke: #c62828; stroke-width: 2; }
      .ok-panel { fill: #e8f5e9; stroke: #2e7d32; stroke-width: 2; }
      .ng-text { fill: #c62828; font-weight: bold; }
      .ok-text { fill: #2e7d32; font-weight: bold; }
      .spike { fill: none; stroke: #c62828; stroke-width: 2.5; }
    </style>
  </defs>

  <text x="390" y="25" text-anchor="middle" class="big">5V マイコン × 3.3V センサ：直結（NG）と レベル変換 経由（OK）</text>

  <!-- Panel 1: NG - direct connection -->
  <g transform="translate(30,55)">
    <rect x="0" y="0" width="360" height="270" rx="8" class="ng-panel"/>
    <text x="180" y="25" text-anchor="middle" class="big ng-text">✗ 5V ロジックを 3.3V センサに直結</text>

    <!-- Arduino -->
    <rect x="20" y="65" width="100" height="120" rx="4" class="board"/>
    <text x="70" y="90" text-anchor="middle" class="big">Arduino Uno</text>
    <text x="70" y="108" text-anchor="middle" class="small">(5V)</text>
    <rect x="120" y="120" width="14" height="12" class="board"/>
    <text x="125" y="115" text-anchor="start" class="small">SCL</text>
    <rect x="120" y="145" width="14" height="12" class="board"/>
    <text x="125" y="140" text-anchor="start" class="small">SDA</text>

    <!-- 5V signal wire directly to sensor -->
    <line x1="134" y1="126" x2="230" y2="126" class="wire" stroke="#c62828"/>
    <line x1="134" y1="151" x2="230" y2="151" class="wire" stroke="#c62828"/>
    <text x="180" y="118" text-anchor="middle" class="small ng-text">5V 信号</text>

    <!-- Sensor module -->
    <rect x="230" y="95" width="110" height="90" rx="4" class="sensor"/>
    <text x="285" y="120" text-anchor="middle" class="big">3.3V センサ</text>
    <text x="285" y="138" text-anchor="middle" class="small">（MPU6050 等）</text>

    <!-- Damage indicators -->
    <circle cx="230" cy="126" r="8" fill="#ffeb3b" stroke="#f57f17" stroke-width="1.5"/>
    <circle cx="230" cy="151" r="8" fill="#ffeb3b" stroke="#f57f17" stroke-width="1.5"/>
    <text x="230" y="130" text-anchor="middle" class="small" font-weight="bold">!</text>
    <text x="230" y="155" text-anchor="middle" class="small" font-weight="bold">!</text>

    <text x="180" y="210" text-anchor="middle" class="small ng-text">センサのピンに絶対最大定格を超える 5V が直接かかる</text>
    <text x="180" y="228" text-anchor="middle" class="small">→ 通電直後にセンサ破壊（煙が出ないことも多く、</text>
    <text x="180" y="246" text-anchor="middle" class="small">　後から「反応しない」で気付く静かな事故）</text>
  </g>

  <!-- Panel 2: OK - level shifter -->
  <g transform="translate(410,55)">
    <rect x="0" y="0" width="360" height="270" rx="8" class="ok-panel"/>
    <text x="180" y="25" text-anchor="middle" class="big ok-text">✓ レベル変換 IC 経由で接続</text>

    <!-- Arduino -->
    <rect x="20" y="65" width="80" height="110" rx="4" class="board"/>
    <text x="60" y="90" text-anchor="middle" class="big" font-size="12">Arduino</text>
    <text x="60" y="105" text-anchor="middle" class="small">(5V)</text>
    <rect x="100" y="115" width="12" height="10" class="board"/>
    <text x="105" y="111" class="small">SCL</text>
    <rect x="100" y="138" width="12" height="10" class="board"/>
    <text x="105" y="134" class="small">SDA</text>

    <!-- Level shifter IC -->
    <rect x="130" y="65" width="90" height="140" rx="4" class="level"/>
    <text x="175" y="90" text-anchor="middle" class="big" font-size="12">レベル変換</text>
    <text x="175" y="105" text-anchor="middle" class="small">（TXS0108E 等）</text>

    <!-- HV side (5V) -->
    <rect x="125" y="115" width="5" height="10" class="board"/>
    <text x="130" y="135" text-anchor="start" class="small" font-size="10">HV</text>
    <rect x="125" y="138" width="5" height="10" class="board"/>

    <!-- LV side (3.3V) -->
    <rect x="220" y="115" width="5" height="10" class="board"/>
    <text x="220" y="135" text-anchor="end" class="small" font-size="10">LV</text>
    <rect x="220" y="138" width="5" height="10" class="board"/>

    <!-- Annotations for HV/LV -->
    <text x="150" y="185" class="small" fill="#c62828">HV=5V</text>
    <text x="200" y="185" text-anchor="end" class="small" fill="#2e7d32">LV=3.3V</text>

    <!-- Sensor -->
    <rect x="235" y="85" width="100" height="100" rx="4" class="sensor"/>
    <text x="285" y="110" text-anchor="middle" class="big" font-size="12">3.3V センサ</text>
    <text x="285" y="125" text-anchor="middle" class="small">（MPU6050）</text>

    <!-- Wires -->
    <line x1="112" y1="120" x2="125" y2="120" class="wire" stroke="#c62828"/>
    <line x1="112" y1="143" x2="125" y2="143" class="wire" stroke="#c62828"/>
    <line x1="225" y1="120" x2="235" y2="120" class="wire" stroke="#2e7d32"/>
    <line x1="225" y1="143" x2="235" y2="143" class="wire" stroke="#2e7d32"/>

    <text x="180" y="228" text-anchor="middle" class="small ok-text">両側でそれぞれの電圧レベルに収まる → センサが壊れない</text>
    <text x="180" y="246" text-anchor="middle" class="small">I2C なら TXS0108E（8ch）や BSS138 × 2 個も定番</text>
  </g>
</svg>
