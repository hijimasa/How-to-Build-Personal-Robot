<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 400" role="img" aria-label="極性部品の見分け方：LED・電解コンデンサ・ダイオード・IC・トランジスタ">
  <title>LED / 電解コンデンサ / ダイオード / IC / トランジスタ の極性マーキング早見表</title>
  <defs>
    <style>
      .lbl   { font-family: "Noto Sans JP", system-ui, sans-serif; font-size: 12px; fill: #222; }
      .big   { font-family: "Noto Sans JP", system-ui, sans-serif; font-size: 14px; fill: #222; font-weight: bold; }
      .small { font-family: "Noto Sans JP", system-ui, sans-serif; font-size: 11px; fill: #444; }
      .panel { fill: #ffffff; stroke: #888; stroke-width: 1.5; }
      .plus  { fill: #c62828; font-weight: bold; }
      .minus { fill: #212121; font-weight: bold; }
      .body-led { fill: #ef5350; stroke: #b71c1c; stroke-width: 1.5; }
      .body-cap { fill: #e0e0e0; stroke: #666; stroke-width: 1.5; }
      .body-diode { fill: #616161; stroke: #212121; stroke-width: 1.5; }
      .body-ic { fill: #424242; stroke: #212121; stroke-width: 1.5; }
      .body-tr { fill: #9e9e9e; stroke: #424242; stroke-width: 1.5; }
      .lead { stroke: #757575; stroke-width: 2; fill: none; }
      .stripe { fill: #ffffff; stroke: #ffffff; }
      .arrow { stroke: #1565c0; stroke-width: 1.3; fill: none; }
      .marker-blue { fill: #1565c0; }
    </style>
  </defs>

  <!-- Title -->
  <text x="390" y="25" text-anchor="middle" class="big">極性部品の向き — 挿す前に確認する 5 種類</text>

  <!-- ========= Panel 1: LED ========= -->
  <g transform="translate(20,55)">
    <rect x="0" y="0" width="145" height="320" rx="6" class="panel"/>
    <text x="72" y="22" text-anchor="middle" class="big">LED</text>

    <!-- LED body: cylindrical lower half, dome on top (bulging upward) -->
    <!-- Dome (semicircle bulging up from y=105 to y=78) -->
    <path d="M 45 105 A 27.5 27.5 0 0 1 100 105 Z" class="body-led"/>
    <!-- Cylindrical body below dome -->
    <rect x="45" y="105" width="55" height="45" class="body-led"/>
    <!-- Highlight spec: dome top -->
    <ellipse cx="65" cy="90" rx="5" ry="3" fill="#ffffff" opacity="0.4"/>

    <!-- Flat edge on cathode side (right edge of body, where short leg is) -->
    <rect x="96" y="105" width="4" height="45" fill="#b71c1c" stroke="#b71c1c"/>

    <!-- Legs (long = anode on LEFT, short = cathode on RIGHT, with flat side) -->
    <line x1="60" y1="150" x2="60" y2="240" class="lead"/>
    <line x1="85" y1="150" x2="85" y2="210" class="lead"/>

    <!-- Labels -->
    <text x="60" y="260" text-anchor="middle" class="lbl plus">＋</text>
    <text x="85" y="230" text-anchor="middle" class="lbl minus">−</text>
    <text x="60" y="275" text-anchor="middle" class="small">長い足</text>
    <text x="85" y="245" text-anchor="middle" class="small">短い足</text>
    <text x="60" y="288" text-anchor="middle" class="small">アノード</text>
    <text x="85" y="258" text-anchor="middle" class="small">カソード</text>

    <!-- Annotation: dome on top -->
    <line x1="72" y1="80" x2="40" y2="58" class="arrow"/>
    <text x="2" y="52" class="small" fill="#1565c0">先端 は球面（ドーム）</text>

    <!-- Annotation: flat edge on cathode side (points to the flat strip) -->
    <line x1="98" y1="127" x2="140" y2="175" class="arrow"/>
    <text x="108" y="190" class="small" fill="#1565c0">側面の一部が平ら</text>
    <text x="108" y="205" class="small" fill="#1565c0">＝ − 側（カソード）</text>

    <!-- Summary -->
    <rect x="8" y="290" width="130" height="26" rx="3" fill="#fff3e0" stroke="#ef6c00"/>
    <text x="72" y="308" text-anchor="middle" class="lbl" fill="#ef6c00">長い足 が ＋</text>
  </g>

  <!-- ========= Panel 2: 電解コンデンサ ========= -->
  <g transform="translate(175,55)">
    <rect x="0" y="0" width="145" height="320" rx="6" class="panel"/>
    <text x="72" y="22" text-anchor="middle" class="big">電解コンデンサ</text>

    <!-- Cylinder body -->
    <ellipse cx="72" cy="80" rx="35" ry="8" class="body-cap"/>
    <rect x="37" y="80" width="70" height="80" class="body-cap"/>
    <ellipse cx="72" cy="160" rx="35" ry="8" class="body-cap"/>

    <!-- Stripe on minus side (left half) -->
    <rect x="37" y="80" width="22" height="80" fill="#424242" stroke="#424242"/>
    <text x="48" y="130" text-anchor="middle" class="small" fill="#ffffff">−</text>
    <text x="48" y="148" text-anchor="middle" class="small" fill="#ffffff">−</text>
    <text x="48" y="108" text-anchor="middle" class="small" fill="#ffffff">−</text>

    <!-- Legs -->
    <line x1="60" y1="165" x2="60" y2="220" class="lead"/>
    <line x1="85" y1="165" x2="85" y2="240" class="lead"/>

    <text x="60" y="235" text-anchor="middle" class="lbl minus">−</text>
    <text x="85" y="255" text-anchor="middle" class="lbl plus">＋</text>
    <text x="60" y="250" text-anchor="middle" class="small">短い足</text>
    <text x="85" y="270" text-anchor="middle" class="small">長い足</text>

    <!-- Stripe annotation -->
    <line x1="48" y1="120" x2="14" y2="138" class="arrow"/>
    <polygon points="14,138 19,131 24,139" class="marker-blue"/>
    <text x="14" y="152" class="small" fill="#1565c0">白帯／「−」印字</text>
    <text x="14" y="166" class="small" fill="#1565c0">＝ 負極側</text>

    <rect x="8" y="290" width="130" height="26" rx="3" fill="#ffebee" stroke="#c62828"/>
    <text x="72" y="308" text-anchor="middle" class="lbl" fill="#c62828">逆挿入で爆発</text>
  </g>

  <!-- ========= Panel 3: ダイオード ========= -->
  <g transform="translate(330,55)">
    <rect x="0" y="0" width="145" height="320" rx="6" class="panel"/>
    <text x="72" y="22" text-anchor="middle" class="big">ダイオード</text>

    <!-- Cylinder body -->
    <rect x="35" y="90" width="74" height="24" rx="4" class="body-diode"/>
    <!-- Cathode band (white on diode body) -->
    <rect x="90" y="90" width="14" height="24" fill="#eeeeee" stroke="#424242" stroke-width="1"/>

    <!-- Leads extending from ends -->
    <line x1="35" y1="102" x2="0" y2="102" class="lead"/>
    <line x1="109" y1="102" x2="144" y2="102" class="lead"/>

    <!-- Labels -->
    <text x="16" y="94" class="lbl plus">＋</text>
    <text x="130" y="94" class="lbl minus">−</text>
    <text x="16" y="127" class="small">アノード</text>
    <text x="128" y="127" class="small">カソード</text>

    <!-- Current direction arrow -->
    <line x1="30" y1="150" x2="110" y2="150" class="arrow"/>
    <polygon points="110,150 103,146 103,154" class="marker-blue"/>
    <text x="72" y="145" text-anchor="middle" class="small" fill="#1565c0">電流はこちら向き</text>
    <text x="72" y="168" text-anchor="middle" class="small" fill="#1565c0">のみ流れる</text>

    <!-- Band annotation -->
    <line x1="97" y1="90" x2="97" y2="200" stroke="#1565c0" stroke-width="1.2" stroke-dasharray="3 2"/>
    <text x="55" y="215" class="small" fill="#1565c0">本体の帯 = カソード</text>

    <!-- Example part number -->
    <text x="72" y="265" text-anchor="middle" class="small">例: 1N4007 / 1N5819</text>

    <rect x="8" y="290" width="130" height="26" rx="3" fill="#fff3e0" stroke="#ef6c00"/>
    <text x="72" y="308" text-anchor="middle" class="lbl" fill="#ef6c00">帯 印刷 が − 側</text>
  </g>

  <!-- ========= Panel 4: IC (DIP) ========= -->
  <g transform="translate(485,55)">
    <rect x="0" y="0" width="145" height="320" rx="6" class="panel"/>
    <text x="72" y="22" text-anchor="middle" class="big">IC（DIP パッケージ）</text>

    <!-- IC body -->
    <rect x="35" y="90" width="74" height="80" rx="3" class="body-ic"/>
    <!-- Notch indicator -->
    <path d="M 62 90 A 10 10 0 0 0 82 90 Z" fill="#eeeeee" stroke="#424242" stroke-width="1"/>
    <!-- Dot indicator near pin 1 -->
    <circle cx="43" cy="100" r="3" fill="#eeeeee" stroke="#424242"/>

    <!-- Pins (4 each side) -->
    <g stroke="#757575" stroke-width="2" fill="none">
      <line x1="35" y1="100" x2="25" y2="100"/>
      <line x1="35" y1="118" x2="25" y2="118"/>
      <line x1="35" y1="142" x2="25" y2="142"/>
      <line x1="35" y1="160" x2="25" y2="160"/>
      <line x1="109" y1="100" x2="119" y2="100"/>
      <line x1="109" y1="118" x2="119" y2="118"/>
      <line x1="109" y1="142" x2="119" y2="142"/>
      <line x1="109" y1="160" x2="119" y2="160"/>
    </g>
    <!-- Pin numbers -->
    <text x="20" y="104" text-anchor="end" class="small">1</text>
    <text x="20" y="122" text-anchor="end" class="small">2</text>
    <text x="20" y="146" text-anchor="end" class="small">3</text>
    <text x="20" y="164" text-anchor="end" class="small">4</text>
    <text x="125" y="104" class="small">8</text>
    <text x="125" y="122" class="small">7</text>
    <text x="125" y="146" class="small">6</text>
    <text x="125" y="164" class="small">5</text>

    <!-- Annotation -->
    <line x1="72" y1="80" x2="72" y2="55" stroke="#1565c0" stroke-width="1.2"/>
    <text x="72" y="50" text-anchor="middle" class="small" fill="#1565c0">切り欠き or 丸印</text>

    <line x1="43" y1="95" x2="5" y2="195" stroke="#1565c0" stroke-width="1.2" stroke-dasharray="3 2"/>
    <text x="5" y="210" class="small" fill="#1565c0">1 番ピン</text>

    <!-- Additional note -->
    <text x="72" y="255" text-anchor="middle" class="small">ピン番号は 反時計回り</text>
    <text x="72" y="270" text-anchor="middle" class="small">（上から見て）</text>

    <rect x="8" y="290" width="130" height="26" rx="3" fill="#e1f5fe" stroke="#0277bd"/>
    <text x="72" y="308" text-anchor="middle" class="lbl" fill="#0277bd">印のある側 が Pin 1</text>
  </g>

  <!-- ========= Panel 5: Transistor ========= -->
  <g transform="translate(640,55)">
    <rect x="0" y="0" width="130" height="320" rx="6" class="panel"/>
    <text x="65" y="22" text-anchor="middle" class="big">トランジスタ</text>
    <text x="65" y="38" text-anchor="middle" class="small">（TO-92 例）</text>

    <!-- Body: D-shape (flat on one side) -->
    <path d="M 35 100 L 95 100 A 30 30 0 0 1 95 160 L 35 160 Z" class="body-tr"/>

    <!-- Legs -->
    <line x1="50" y1="160" x2="50" y2="230" class="lead"/>
    <line x1="65" y1="160" x2="65" y2="250" class="lead"/>
    <line x1="80" y1="160" x2="80" y2="230" class="lead"/>

    <!-- Pin letters -->
    <text x="50" y="245" text-anchor="middle" class="small">?</text>
    <text x="65" y="265" text-anchor="middle" class="small">?</text>
    <text x="80" y="245" text-anchor="middle" class="small">?</text>

    <!-- Annotation -->
    <line x1="35" y1="130" x2="5" y2="155" stroke="#1565c0" stroke-width="1.2"/>
    <text x="5" y="170" class="small" fill="#1565c0">平らな面</text>

    <!-- Note -->
    <rect x="8" y="275" width="114" height="40" rx="3" fill="#fff9c4" stroke="#f9a825"/>
    <text x="65" y="292" text-anchor="middle" class="small" fill="#ef6c00">ピン配置は</text>
    <text x="65" y="306" text-anchor="middle" class="small" fill="#ef6c00">データシート必見</text>
  </g>
</svg>
