<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 340" role="img" aria-label="GPIO から DC モータを直接駆動する NG 回路">
  <title>GPIO 直結の NG 例：Arduino Uno R3 の D9 ピンから直接 DC モータを駆動するとマイコンが破壊される</title>
  <defs>
    <style>
      .wire  { stroke: #525252; stroke-width: 2;   fill: none; stroke-linecap: round; }
      .body  { stroke: #525252; stroke-width: 2;   fill: #ffffff; }
      .board { stroke: #525252; stroke-width: 2;   fill: #eceff1; }
      .lbl   { font-family: "Noto Sans JP", system-ui, sans-serif; font-size: 13px; fill: #222222; }
      .big   { font-family: "Noto Sans JP", system-ui, sans-serif; font-size: 16px; fill: #222222; font-weight: bold; }
      .pin   { font-family: system-ui, sans-serif; font-size: 11px; fill: #222222; }
      .ng    { font-family: "Noto Sans JP", system-ui, sans-serif; font-size: 18px; fill: #c62828; font-weight: bold; }
      .ngbox { fill: #ffebee; stroke: #c62828; stroke-width: 2; }
      .boom  { stroke: #c62828; stroke-width: 2.5; fill: #ffcdd2; }
      .current { stroke: #c62828; stroke-width: 2.5; fill: #c62828; }
      .current-nf { stroke: #c62828; stroke-width: 2.5; fill: none; }
    </style>
  </defs>

  <!-- Arduino Uno "board" rectangle -->
  <rect x="40" y="80" width="220" height="180" rx="8" class="board"/>
  <text x="150" y="108" text-anchor="middle" class="big">Arduino Uno R3</text>

  <!-- GPIO pin block -->
  <rect x="240" y="130" width="24" height="16" class="body"/>
  <text x="235" y="141" text-anchor="end" class="pin">D9</text>
  <rect x="240" y="210" width="24" height="16" class="body"/>
  <text x="235" y="221" text-anchor="end" class="pin">GND</text>

  <!-- Wires: D9 → motor (+) -->
  <line x1="264" y1="138" x2="380" y2="138" class="wire"/>
  <!-- GND → motor (−) -->
  <line x1="264" y1="218" x2="380" y2="218" class="wire"/>

  <!-- Motor symbol: circle with M -->
  <circle cx="430" cy="178" r="42" class="body"/>
  <text x="430" y="186" text-anchor="middle" class="big" font-size="22">M</text>
  <line x1="380" y1="138" x2="400" y2="158" class="wire"/>
  <line x1="400" y1="158" x2="400" y2="160" class="wire"/>
  <line x1="380" y1="218" x2="400" y2="198" class="wire"/>
  <!-- motor terminals -->
  <line x1="400" y1="158" x2="415" y2="158" class="wire"/>
  <line x1="400" y1="198" x2="415" y2="198" class="wire"/>
  <text x="460" y="165" class="lbl">+</text>
  <text x="460" y="205" class="lbl">−</text>
  <text x="430" y="240" text-anchor="middle" class="lbl">DC モータ</text>
  <text x="430" y="256" text-anchor="middle" class="lbl">（停止時突入 ≈ 数百 mA）</text>

  <!-- Inrush current arrow -->
  <line x1="300" y1="110" x2="375" y2="110" class="current-nf"/>
  <polygon points="378,110 366,104 366,116" class="current"/>
  <text x="340" y="100" class="ng" text-anchor="middle">I ≫ 40 mA</text>

  <!-- Explosion mark on the GPIO pin -->
  <polygon points="252,138 246,124 260,128 268,118 266,132 282,132 270,142 278,154 262,150 258,164 250,152 238,156 246,144" class="boom"/>
  <text x="252" y="80" class="ng" text-anchor="middle">💥</text>

  <!-- NG label banner -->
  <rect x="20" y="20" width="580" height="40" rx="6" class="ngbox"/>
  <text x="310" y="48" text-anchor="middle" class="ng">NG — 実機で組まないこと</text>

  <!-- Caption -->
  <text x="310" y="300" text-anchor="middle" class="lbl">ATmega328P の絶対最大定格は 1 ピンあたり 40 mA。</text>
  <text x="310" y="318" text-anchor="middle" class="lbl">DC モータの起動電流（数百 mA〜）を流すと、D9 の出力段が破壊される。</text>
</svg>
