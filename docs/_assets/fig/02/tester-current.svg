<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 340" role="img" aria-label="テスタで電流を測る：回路を切って直列に挿入">
  <title>電流測定：回路を切ってテスタを直列に挿入する。赤プローブは A 端子に差し替え、レンジは最大から下げていく。</title>
  <defs>
    <style>
      .wire  { stroke: #525252; stroke-width: 2; fill: none; stroke-linecap: round; }
      .body  { stroke: #525252; stroke-width: 2; fill: #ffffff; }
      .thick { stroke: #525252; stroke-width: 3; fill: none; }
      .lbl   { font-family: "Noto Sans JP", system-ui, sans-serif; font-size: 13px; fill: #222; }
      .big   { font-family: "Noto Sans JP", system-ui, sans-serif; font-size: 15px; font-weight: bold; fill: #222; }
      .val   { font-family: system-ui, sans-serif; font-size: 13px; font-weight: bold; fill: #c62828; }
      .meter-box { fill: #fff8e1; stroke: #f9a825; stroke-width: 2.5; }
      .redp  { stroke: #c62828; stroke-width: 2.5; fill: none; stroke-linecap: round; }
      .blackp{ stroke: #212121; stroke-width: 2.5; fill: none; stroke-linecap: round; }
      .disp  { fill: #1a237e; font-family: monospace; font-size: 22px; font-weight: bold; }
      .warn  { font-family: "Noto Sans JP", system-ui, sans-serif; font-size: 16px; font-weight: bold; fill: #c62828; }
      .cut   { stroke: #c62828; stroke-width: 2.5; stroke-dasharray: 6 4; fill: none; }
    </style>
  </defs>

  <!-- Warn banner -->
  <rect x="20" y="16" width="580" height="36" rx="6" fill="#ffebee" stroke="#c62828" stroke-width="2"/>
  <text x="310" y="40" text-anchor="middle" class="warn">注意 — プローブを「A 端子」に差し替えてから、回路を切って 直列 に挿入</text>

  <!-- Left vertical wire & battery -->
  <line x1="60" y1="100" x2="60" y2="240" class="wire"/>
  <line x1="45" y1="165" x2="75" y2="165" class="thick"/>
  <line x1="55" y1="180" x2="65" y2="180" class="thick"/>
  <text x="30" y="170" class="lbl">+</text>
  <text x="30" y="195" class="lbl">−</text>
  <text x="22" y="150" class="big">5 V</text>

  <!-- Top wire: battery + → resistor → (gap for meter) → LED + -->
  <line x1="60"  y1="100" x2="200" y2="100" class="wire"/>
  <rect x="200" y="88" width="100" height="24" class="body" rx="2"/>
  <text x="250" y="80" text-anchor="middle" class="big">1 kΩ</text>
  <!-- Gap: circuit is cut here for the meter -->
  <line x1="300" y1="100" x2="340" y2="100" class="cut"/>
  <text x="320" y="78" text-anchor="middle" class="val" font-size="12">ここを切って挿入</text>
  <line x1="340" y1="100" x2="500" y2="100" class="wire"/>

  <!-- LED -->
  <line x1="500" y1="100" x2="500" y2="140" class="wire"/>
  <polygon points="485,140 515,140 500,170" class="body"/>
  <line x1="485" y1="170" x2="515" y2="170" class="thick"/>
  <line x1="500" y1="170" x2="500" y2="240" class="wire"/>
  <text x="540" y="160" class="lbl">LED</text>

  <!-- Bottom wire -->
  <line x1="60" y1="240" x2="500" y2="240" class="wire"/>

  <!-- Multimeter inserted in series in the top wire -->
  <rect x="240" y="180" width="160" height="80" class="meter-box" rx="6"/>
  <text x="320" y="198" text-anchor="middle" class="lbl">DMM（電流レンジ）</text>
  <rect x="252" y="204" width="136" height="36" fill="#ffffff" stroke="#f9a825" stroke-width="1.5"/>
  <text x="320" y="230" text-anchor="middle" class="disp">3.42 mA</text>

  <!-- A probe (red) to the resistor end -->
  <path d="M 268 260 L 268 290 L 290 290 L 290 112 L 300 112 L 300 100" class="redp"/>
  <text x="260" y="282" class="val">A</text>

  <!-- COM probe (black) to LED side of gap -->
  <path d="M 372 260 L 372 290 L 350 290 L 350 112 L 340 112 L 340 100" class="blackp"/>
  <text x="378" y="282" class="lbl">COM</text>

  <!-- Caption -->
  <text x="310" y="310" text-anchor="middle" class="lbl">A 端子は内部抵抗がほぼゼロ（低抵抗シャント）。電流測定を終えたら、必ず赤プローブを V 端子に戻す。</text>
  <text x="310" y="326" text-anchor="middle" class="lbl">A 端子のまま電圧を測ろうとすると、テスタ内部が電源を短絡して ヒューズが飛ぶ（安い機種は本体焼損）。</text>
</svg>
