<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 290" role="img" aria-label="オームの法則の簡単な直列回路">
  <title>オームの法則：5V 電源に 220Ω 抵抗と赤 LED を直列接続した回路</title>
  <defs>
    <style>
      .wire  { stroke: #525252; stroke-width: 2;   fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .thick { stroke: #525252; stroke-width: 3;   fill: none; }
      .body  { stroke: #525252; stroke-width: 2;   fill: #ffffff; }
      .lbl   { font-family: "Noto Sans JP", system-ui, sans-serif; font-size: 14px; fill: #222222; }
      .big   { font-family: "Noto Sans JP", system-ui, sans-serif; font-size: 18px; font-weight: bold; fill: #222222; }
      .val   { font-family: system-ui, sans-serif; font-size: 14px; font-weight: bold; fill: #c62828; }
      .eq    { font-family: "Noto Sans JP", system-ui, sans-serif; font-size: 17px; fill: #222222; }
      .accent { stroke: #1565c0; stroke-width: 2; fill: #1565c0; }
      .accent-nf { stroke: #1565c0; stroke-width: 2; fill: none; }
    </style>
  </defs>

  <!-- Left vertical wire (battery lead) -->
  <line x1="60"  y1="80"  x2="60"  y2="220" class="wire"/>
  <!-- Top horizontal wire -->
  <line x1="60"  y1="80"  x2="190" y2="80"  class="wire"/>
  <line x1="290" y1="80"  x2="470" y2="80"  class="wire"/>
  <!-- Bottom horizontal wire -->
  <line x1="60"  y1="220" x2="470" y2="220" class="wire"/>

  <!-- Battery symbol (long + plate on top, short - plate below) -->
  <line x1="45" y1="145" x2="75" y2="145" class="thick"/>
  <line x1="55" y1="160" x2="65" y2="160" class="thick"/>
  <text x="82"  y="150" class="lbl">+</text>
  <text x="82"  y="166" class="lbl">−</text>
  <text x="30"  y="135" class="big" text-anchor="middle">V</text>
  <text x="30"  y="185" class="val" text-anchor="middle">5 V</text>

  <!-- Resistor (rectangle) -->
  <rect x="190" y="68" width="100" height="24" class="body" rx="2"/>
  <text x="240" y="60"  text-anchor="middle" class="big">R</text>
  <text x="240" y="112" text-anchor="middle" class="val">220 Ω</text>

  <!-- LED (triangle + line cathode) -->
  <line x1="470" y1="80"  x2="470" y2="130" class="wire"/>
  <polygon points="455,130 485,130 470,158" class="body"/>
  <line x1="455" y1="158" x2="485" y2="158" class="thick"/>
  <line x1="470" y1="158" x2="470" y2="220" class="wire"/>
  <!-- LED emission arrows -->
  <line x1="495" y1="140" x2="515" y2="120" class="accent-nf"/>
  <polygon points="515,120 508,121 514,127" class="accent"/>
  <line x1="505" y1="145" x2="525" y2="125" class="accent-nf"/>
  <polygon points="525,125 518,126 524,132" class="accent"/>
  <text x="540" y="138" class="lbl">LED</text>

  <!-- Current direction arrow on top -->
  <line x1="200" y1="42" x2="270" y2="42" class="accent-nf"/>
  <polygon points="272,42 260,37 260,47" class="accent"/>
  <text x="235" y="32"  text-anchor="middle" class="big" fill="#1565c0">I</text>

  <!-- Equation -->
  <text x="310" y="270" text-anchor="middle" class="eq">I = V / R = 5 V ÷ 220 Ω ≒ 22.7 mA</text>
</svg>
